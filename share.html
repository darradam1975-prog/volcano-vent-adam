<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <base href="/">
  <meta name="theme-color" content="#1a0f0a">
  <title>Shared chat — Adam The Volcano Vent Bot</title>
  <meta name="description" content="Read-only shared Volcano Vent Dice conversation with Adam The Volcano Vent Bot.">
  <meta property="og:title" content="Shared Volcano Vent Dice chat">
  <meta property="og:description" content="Read-only chat about Volcano Vent Dice rules with Adam The Volcano Vent Bot.">
  <meta property="og:type" content="article">
  <meta name="twitter:card" content="summary">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css?v=59">
</head>
<body class="share-page">
  <div class="app-shell share-shell">
    <div class="main-column">
      <header class="header share-header">
        <div class="brand">
          <div class="brand-icon" aria-hidden="true">🌋</div>
          <div>
            <h1 id="share-page-title">Shared chat</h1>
            <p class="tagline" id="share-page-subtitle">Adam The Volcano Vent Bot · read-only</p>
          </div>
        </div>
        <div class="header-controls">
          <a class="btn-secondary share-start-btn" href="/">Start your own chat</a>
        </div>
      </header>

      <p class="share-banner" id="share-banner">Anyone with this link can read this conversation.</p>

      <main class="chat-wrap share-chat-wrap">
        <div class="chat-viewport share-viewport" id="share-viewport">
          <div class="chat-messages" id="share-chat" role="log" aria-live="polite"></div>
        </div>
        <p class="share-loading" id="share-loading">Loading shared chat…</p>
        <p class="share-error hidden" id="share-error"></p>
      </main>

      <p class="footer-note share-footer">Shared voluntarily by the chat owner. <a href="/">Open Adam The Volcano Vent Bot</a> to ask your own questions.</p>
    </div>
  </div>

  <script>
    function formatMarkdown(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }

    function shareIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const q = params.get('s') || params.get('shareId') || params.get('share');
      if (q) return q.trim();
      const parts = window.location.pathname.split('/').filter(Boolean);
      if (parts[0] === 's' && parts[1]) return decodeURIComponent(parts[1]);
      return null;
    }

    function shareApiUrl(shareId) {
      const origin = window.location.origin;
      return `${origin}/.netlify/functions/share?shareId=${encodeURIComponent(shareId)}&_=${Date.now()}`;
    }

    function renderMessage(role, text, source) {
      const el = document.createElement('div');
      el.className = `message ${role}`;
      const body = document.createElement('div');
      body.className = 'message-body';
      body.innerHTML = formatMarkdown(text);
      el.appendChild(body);
      if (source && role === 'assistant') {
        const meta = document.createElement('div');
        meta.className = 'message-meta';
        meta.textContent = source;
        el.appendChild(meta);
      }
      return el;
    }

    function showShareError(msg) {
      const errEl = document.getElementById('share-error');
      if (errEl) {
        errEl.textContent = msg;
        errEl.classList.remove('hidden');
      }
    }

    async function loadSharedChat() {
      const loading = document.getElementById('share-loading');
      const errEl = document.getElementById('share-error');
      const chat = document.getElementById('share-chat');
      if (errEl) errEl.classList.add('hidden');

      try {
        const shareId = shareIdFromUrl();
        if (!shareId) {
          showShareError('Missing share link — ask the sender for the full URL.');
          return;
        }

        const res = await fetch(shareApiUrl(shareId), { cache: 'no-store' });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.error || `Share not found (${res.status})`);
        }

        const messages = Array.isArray(data.messages) ? data.messages : [];
        if (!messages.length) {
          throw new Error('This share link has no messages yet.');
        }

        const title = data.title || 'Shared Volcano Vent chat';
        document.title = `${title} — Adam The Volcano Vent Bot`;
        const titleEl = document.getElementById('share-page-title');
        if (titleEl) titleEl.textContent = title;
        const ogTitle = document.querySelector('meta[property="og:title"]');
        if (ogTitle) ogTitle.setAttribute('content', title);

        messages.forEach(m => {
          if (chat) chat.appendChild(renderMessage(m.role, m.text, m.source));
        });

        if (chat) chat.scrollTop = chat.scrollHeight;
      } catch (e) {
        showShareError(String(e.message || e));
      } finally {
        if (loading) loading.classList.add('hidden');
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadSharedChat);
    } else {
      loadSharedChat();
    }
  </script>
</body>
</html>
